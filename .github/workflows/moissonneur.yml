name: 🤖 Moissonneur de Parkings (Montpellier)

# DÉCLENCHEURS (Quand le robot doit-il travailler ?)
on:
  schedule:
    # Format Cron : '0 0 * * *' signifie "À 00h00 chaque jour" (Heure UTC)
    # Note : Cela correspond à 01h00 (hiver) ou 02h00 (été) à Montpellier.
    - cron: '0 0 * * *'
  
  # Permet de déclencher le script manuellement depuis l'interface GitHub (onglet Actions)
  workflow_dispatch: 

# LES TÂCHES DU ROBOT
jobs:
  recolte_et_sauvegarde:
    runs-on: ubuntu-latest # Le robot utilise un serveur Linux gratuit

    # Les permissions sont obligatoires pour que le robot ait le droit de modifier ton dépôt
    permissions:
      contents: write

    steps:
      # 1. Le robot télécharge ton code
      - name: 📥 Récupérer les fichiers du projet
        uses: actions/checkout@v3

      # 2. Le robot installe Python
      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Le robot installe les outils nécessaires
      - name: 📦 Installer les bibliothèques
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      # 4. Le robot lance la moisson
      - name: ⚙️ Faire tourner l'usine (Lancer le script)
        run: python moissonneur.py

      # 5. CRITIQUE : Le robot sauvegarde le fichier SQLite modifié sur ton GitHub
      - name: 💾 Sauvegarder la base de données
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          git add usine_data_montpellier.db
          # Si la base a changé, on commit et on push. Sinon, on ne fait rien
          git commit -m "🔄 Moisson quotidienne : Archive de minuit" || echo "Aucun changement détecté"
          git push
