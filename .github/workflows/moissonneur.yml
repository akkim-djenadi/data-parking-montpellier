name: 🤖 Moissonneur de Parkings (Montpellier)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  recolte_et_sauvegarde:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Récupérer les fichiers du projet
        uses: actions/checkout@v3

      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Installer les bibliothèques
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: ⚙️ Faire tourner l'usine (Lancer le script)
        run: python moissonneur.py

      - name: 💾 Sauvegarder la base de données
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          git add usine_data_montpellier.db
          git commit -m "🔄 Moisson quotidienne : Archive de minuit" || echo "Aucun changement détecté"
          git push
